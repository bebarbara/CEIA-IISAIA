<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semana NN — TOPIC_TITLE</title>
  <link rel="stylesheet" href="../../../node_modules/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="../../../node_modules/reveal.js/dist/theme/black.css">
  <link rel="stylesheet" href="../../../node_modules/reveal.js/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="../../../_config/theme/custom.css">
  <link rel="stylesheet" href="../../../_config/theme/components.css">
  <style>
    /* Safety net for dense slides: when a slide's content exceeds the
       canvas height, show a vertical scrollbar instead of clipping
       the bottom. Only kicks in when overflow is real. */
    .reveal .slides > section,
    .reveal .slides > section > section {
      overflow-y: auto;
      max-height: 100%;
    }
    /* Make all <pre>/<code> blocks respect their containing card.
       Reveal.js defaults: pre at width: 90%, and `pre code` with
       overflow: auto + word-wrap: normal — that forces a horizontal
       scrollbar instead of wrapping. We override both. */
    .reveal pre {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box !important;
      white-space: pre-wrap !important;
      word-break: break-word !important;
      overflow-wrap: anywhere !important;
    }
    .reveal pre code {
      white-space: pre-wrap !important;
      word-break: break-word !important;
      overflow-wrap: anywhere !important;
      overflow: visible !important;
      max-height: none !important;
      display: block;
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <!-- Title Slide -->
      <section class="title-slide">
        <h1>TOPIC_TITLE</h1>
        <p class="subtitle">Tagline corto que capture el hilo conductor de la semana</p>
        <p class="muted">Introduccion al desarrollo de software asistido por IA</p>
      </section>

      <!-- Section: Example -->
      <section>
        <section>
          <h2>Section Title</h2>
          <p>Main concept goes here.</p>
          <aside class="notes">
            Speaker notes: detailed explanation for the professor.
          </aside>
        </section>
        <!-- Vertical slide for deep-dive -->
        <section>
          <h3>Deep Dive</h3>
          <p>Additional detail.</p>
        </section>
      </section>

      <!-- Closing Slide -->
      <section class="section-divider">
        <h2>Preguntas?</h2>
      </section>

    </div>
  </div>

  <script src="../../../node_modules/reveal.js/dist/reveal.js"></script>
  <script src="../../../node_modules/reveal.js/plugin/highlight/highlight.js"></script>
  <script src="../../../node_modules/reveal.js/plugin/notes/notes.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: true,
      transition: 'fade',
      width: 1280,
      height: 800,
      margin: 0.02,
      plugins: [RevealHighlight, RevealNotes]
    });
  </script>
</body>
</html>
