<!--
  Pattern: Title slide
  When to use: As the first slide of every week (week opener with topic + subtitle).
  IMPORTANT: h1 is the TOPIC TITLE, not "Semana NN". The week number lives in the
    document <title>, not on the slide. Subtitle is a short tagline that captures
    the week's through-line.
  Canonical example: semanas/01/slides/index.html:18
-->
<section class="title-slide">
  <h1>Título del tema</h1>
  <p class="subtitle">Tagline corto que capture el hilo conductor</p>
  <p class="muted">Introducción al desarrollo de software asistido por IA</p>
  <aside class="notes">
    <p><strong>Proyectar mientras se acomodan. Esperar 1-2 min.</strong></p>
    <p><u>Slide de apertura de la semana.</u></p>
    <p><em>"Hoy vamos a ver [tema en una frase]. Al final de la clase vas a poder [resultado concreto]."</em></p>
  </aside>
</section>
